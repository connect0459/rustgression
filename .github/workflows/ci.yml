name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: # allows manual execution

run-name: CI on ${{ github.head_ref || github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # prevent one failing environment from cancelling all others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Detect changed files to skip subsequent steps when no relevant files are modified
      - name: Detect changed files
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '.github/workflows/ci.yml'
              - '.python-version'
              - 'examples/**'
              - 'scripts/**'
              - 'src/**'
              - 'src-py/**'
              - 'tests-py/**'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'pyproject.toml'
              - 'rust-toolchain.toml'
              - 'uv.lock'

      - name: Set up Python (uv)
        if: steps.filter.outputs.code == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Cache Cargo registry
        if: steps.filter.outputs.code == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Rust
        if: steps.filter.outputs.code == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        # automatically reads rust-toolchain.toml to set up the toolchain

      # Set up Rust build dependencies for Linux (Ubuntu)
      - name: Set up Rust build dependencies (Ubuntu)
        if: steps.filter.outputs.code == 'true' && matrix.os == 'ubuntu-latest'
        run: |
          if command -v cmake &> /dev/null; then
            echo "cmake is already installed"
            cmake --version
          else
            sudo apt-get update
            sudo apt-get install -y cmake
          fi

      # Set up Rust build dependencies for macOS
      - name: Set up Rust build dependencies (macOS)
        if: steps.filter.outputs.code == 'true' && matrix.os == 'macos-latest'
        run: |
          if command -v cmake &> /dev/null; then
            echo "cmake is already installed"
            cmake --version
          else
            brew install cmake
          fi

      # Set up Rust build dependencies for Windows
      - name: Set up Rust build dependencies (Windows)
        if: steps.filter.outputs.code == 'true' && matrix.os == 'windows-latest'
        run: |
          if (Get-Command cmake -ErrorAction SilentlyContinue) {
            Write-Output "cmake is already installed"
            cmake --version
          } else {
            choco install cmake -y
          }

      # Sync Python dependencies
      - name: Install Python dependencies
        if: steps.filter.outputs.code == 'true'
        shell: bash
        run: |
          # Print environment info
          echo "Building environment info:"
          uv run python --version
          rustc --version

          # Sync dependencies from pyproject.toml (including main, dev, and examples dependencies)
          uv sync --frozen --extra examples

      # Rust lint and format checks
      - name: Lint and format Rust
        if: steps.filter.outputs.code == 'true'
        shell: bash
        run: |
          echo "Checking Rust code formatting..."
          cargo fmt --all --check

          echo "Running Rust clippy..."
          cargo clippy --all-targets --all-features -- -D warnings

          echo "Rust lint and format checks passed!"

      # Python lint and format checks
      - name: Lint and format Python
        if: steps.filter.outputs.code == 'true'
        shell: bash
        run: |
          echo "Checking Python code with ruff..."
          uv run ruff check
          uv run ruff format --check

          echo "Python lint and format checks passed!"

      # Run Rust unit tests
      - name: Run Rust tests
        if: steps.filter.outputs.code == 'true'
        shell: bash
        run: |
          echo "Running Rust unit tests..."
          cargo test
          echo "Rust tests passed!"

      # Build and install Python package
      - name: Build and install Python wheels
        if: steps.filter.outputs.code == 'true'
        shell: bash
        run: |
          # Clean up pre-generated wheels
          # ref: <https://github.com/connect0459/rustgression/pull/44>
          rm -rf target/wheels/ || echo "No wheels directory to clean"

          # Build wheels (ensure PyPI compatibility)
          uv run maturin build --release --compatibility pypi

          # Verify built wheels
          echo "Built wheels:"
          ls -la target/wheels/ || echo "No wheels directory found"

          # Verify installed packages
          echo "Installed packages:"
          uv pip list

          # Verify Python module paths and module structure
          uv run python -c "import sys; print('Python module paths:'); [print(p) for p in sys.path]"
          uv run python -c "import rustgression; print('Rustgression module location:', rustgression.__file__)"

      # Run Python tests
      - name: Run Python tests
        if: steps.filter.outputs.code == 'true'
        shell: bash
        run: |
          # Verify import (fail the workflow if import fails)
          if ! uv run python -c "import rustgression"; then
            echo "Import failed: rustgression module not found."
            exit 1
          fi

          # Run tests
          uv run pytest

      # Run examples as smoke tests for the public API
      - name: Run examples
        if: steps.filter.outputs.code == 'true'
        shell: bash
        run: |
          echo "Running examples..."
          for f in examples/*.py; do
            echo "Running $f..."
            uv run python "$f"
          done
          echo "All examples passed!"

      # Success message when no relevant changes are detected
      - name: Skip CI checks (no relevant changes)
        if: steps.filter.outputs.code != 'true'
        shell: bash
        run: |
          echo "No changes detected in code-related files."
          echo "Skipping build, lint, and test steps."
          echo "CI passed successfully."
