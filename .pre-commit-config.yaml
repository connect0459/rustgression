repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: rust-fmt
        name: rust fmt
        entry: cargo fmt
        language: system
        files: \.rs$
        pass_filenames: false
        args: [--all, --check]
      - id: rust-clippy
        name: rust clippy
        entry: cargo clippy
        language: system
        files: \.rs$
        pass_filenames: false
        args: [--all-targets, --all-features, --, -D, warnings]
