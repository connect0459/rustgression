repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      # Rust
      - id: rust-fmt
        name: rust fmt
        entry: cargo fmt
        language: system
        files: \.rs$
        pass_filenames: false
        args: [--all, --check]
      - id: rust-clippy
        name: rust clippy
        entry: cargo clippy
        language: system
        files: \.rs$
        pass_filenames: false
        args: [--all-targets, --all-features, --, -D, warnings]
      - id: rust-test
        name: rust test
        entry: cargo test
        language: system
        files: \.rs$
        pass_filenames: false

      # Python
      - id: python-lint
        name: python lint
        entry: uv run ruff check
        language: system
        files: \.py$
        pass_filenames: false
        args: [--fix]
      - id: python-format
        name: python format
        entry: uv run ruff format
        language: system
        files: \.py$
        pass_filenames: false
      - id: python-test
        name: python test
        entry: uv run pytest
        language: system
        files: \.py$
        pass_filenames: false
